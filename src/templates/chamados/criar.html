{% extends "base.html" %}
{% block title %}Abrir Chamado - CondoFix{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title mb-4">Abrir Novo Chamado</h3>
                <form method="POST" action="{{ url_for('chamados.criar') }}" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título do Problema</label>
                        <input type="text" class="form-control" id="titulo" name="titulo" placeholder="Ex: Vazamento no corredor" required>
                    </div>
                    <div class="mb-3">
                        <label for="setor_id" class="form-label">Setor / Categoria</label>
                        <select class="form-select" id="setor_id" name="setor_id">
                            <option value="">Selecione um setor (opcional)</option>
                            {% for setor in setores %}
                                <option value="{{ setor.id }}">{{ setor.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição Detalhada</label>
                        <textarea class="form-control" id="descricao" name="descricao" rows="4" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="foto" class="form-label">Foto do Problema (opcional, máx 2MB)</label>
                        <input class="form-control" type="file" id="foto" name="foto" accept="image/*">
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('chamados.meus_pedidos') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Abrir Chamado</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Cadastro de Morador - CondoFix{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-success bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
                        <i class="bi bi-person-plus text-success fs-2"></i>
                    </div>
                    <h3 class="fw-bold text-success">Novo Cadastro</h3>
                    <p class="text-muted">Crie sua conta de morador para abrir chamados</p>
                </div>

                <form method="POST" action="{{ url_for('auth.cadastro') }}" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="nome" class="form-label fw-semibold small">Nome Completo</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="nome" name="nome" placeholder="Seu nome aqui" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold small">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email" placeholder="seu@email.com" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="senha" class="form-label fw-semibold small">Senha (mín. 8 caracteres)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-key"></i></span>
                            <input type="password" class="form-control" id="senha" name="senha" minlength="8" placeholder="Crie uma senha forte" required>
                        </div>
                        <div class="form-text small">Use uma combinação de letras e números.</div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="unidade" class="form-label fw-semibold small">Unidade/Apto</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-hash"></i></span>
                                <input type="text" class="form-control" id="unidade" name="unidade" placeholder="Ex: 101" required>
                            </div>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label for="bloco" class="form-label fw-semibold small">Bloco (opcional)</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-building"></i></span>
                                <input type="text" class="form-control" id="bloco" name="bloco" placeholder="Ex: A">
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success py-2 fw-bold">
                            <i class="bi bi-check2-circle me-2"></i>Finalizar Cadastro
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4 border-top pt-3">
                    <p class="mb-0 text-muted small">Já possui uma conta?</p>
                    <a href="{{ url_for('auth.login') }}" class="fw-bold text-decoration-none small">Fazer Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

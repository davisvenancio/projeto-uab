{% extends "base.html" %}
{% block title %}Login - CondoFix{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-primary bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
                        <i class="bi bi-shield-lock text-primary fs-2"></i>
                    </div>
                    <h3 class="fw-bold text-primary">Bem-vindo</h3>
                    <p class="text-muted">Acesse sua conta CondoFix</p>
                </div>
                
                <form method="POST" action="{{ url_for('auth.login') }}" class="needs-validation" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold small">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email" placeholder="nome@email.local" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="senha" class="form-label fw-semibold small">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-key"></i></span>
                            <input type="password" class="form-control" id="senha" name="senha" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary py-2 fw-bold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                        </button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <p class="mb-0 text-muted small">Não tem uma conta?</p>
                    <a href="{{ url_for('auth.cadastro') }}" class="fw-bold text-decoration-none small">Cadastre-se como Morador</a>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <small class="text-muted italic">Sistema de Manutenção v2.0</small>
        </div>
    </div>
</div>
{% endblock %}
